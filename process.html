  <meta charset="UTF-8" />

  <meta property="og:url" content="" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="" />
  <meta property="og:description" content="" />

  <link rel="stylesheet" href="./assets/libs/lenis.css" />

  <link rel="stylesheet" href="./assets/libs/lightpick.min.css" />

  <script>
    if ("scrollRestoration" in history) {
      history.scrollRestoration = "manual";
    }
  </script>

<body class="page-process">
  <script>
    fetch("./components/header.html")
      .then((response) => response.text())
      .then((data) => {
        document.getElementById("header").innerHTML = data;
        const currentPath = window.location.pathname || "/";

        const navLinks = document.querySelectorAll(".header-menu ul>li>a");
        navLinks.forEach((link) => {
          const linkPath = link.getAttribute("href");

          let normalizedCurrentPath = currentPath;
          let normalizedLinkPath = linkPath;

          if (normalizedLinkPath.startsWith("./")) {
            normalizedLinkPath = normalizedLinkPath.substring(1);
          }

          const currentSegment = normalizedCurrentPath.split("/").pop() || "";
          const linkSegment = normalizedLinkPath.split("/").pop() || "";

          const isRootPath =
            currentPath === "/" ||
            currentPath.endsWith("/") ||
            currentSegment === "";

          const isHomeLink =
            linkPath === "/" ||
            linkPath === "./" ||
            linkPath === "./index.html" ||
            linkPath === "index.html" ||
            linkSegment === "index.html";

          const isMatch =
            normalizedLinkPath === normalizedCurrentPath ||
            currentSegment === linkSegment ||
            (isRootPath && isHomeLink) ||
            (currentPath.endsWith(normalizedLinkPath) &&
              normalizedLinkPath !== "/");

          if (isMatch) {
            link.classList.add("active");
          }
        });
      });
  </script>
  <header id="header"
    class="header position-fixed  top-0 start-0 end-0 w-100 d-flex align-items-center justify-content-center"></header>

  <main>
    <section class="hero">
      <div class="hero-inner">
        <div class="distortion-img" data-image-default="./assets/images/del/image-1.jpg"
          data-image-hover="./assets/images/del/image-2.jpg"
          data-displacement="./assets/images/displacement/displacement-1.jpg" data-intensity="0.03">
          <img src="./assets/images/del/image-1.jpg" alt="" />
        </div>
      </div>
    </section>

    <section class="section-process" data-section-process>
      <div class="section-process__inner limit-10-col px-80">
        <h1 class="section-process__title heading-1 font-heading color-white" data-process-reveal>
          Process
        </h1>

        <div class="section-process__timeline">
          <div class="section-process__line" data-process-line></div>

          <dev class="section-process__item" data-process-reveal>
            <p class="section-process__number font-heading color-white">01</p>
            <span class="section-process__dot"></span>
            <h2 class="section-process__item-title font-heading color-white">
              Understand Market. Product. Customer.
            </h2>
          </dev>

          <dev class="section-process__item" data-process-reveal>
            <p class="section-process__number font-heading color-white">02</p>
            <span class="section-process__dot"></span>
            <h2 class="section-process__item-title font-heading color-white">
              Define Concept. Positioning.
            </h2>
          </dev>

          <dev class="section-process__item" data-process-reveal>
            <p class="section-process__number font-heading color-white">03</p>
            <span class="section-process__dot"></span>
            <h2 class="section-process__item-title font-heading color-white">
              Build Brand. Space. Content.
            </h2>
          </dev>

          <dev class="section-process__item" data-process-reveal>
            <p class="section-process__number font-heading color-white">04</p>
            <span class="section-process__dot"></span>
            <h2 class="section-process__item-title font-heading color-white">
              Launch Marketing. Activation.
            </h2>
          </dev>

          <dev class="section-process__item" data-process-reveal>
            <p class="section-process__number font-heading color-white">05</p>
            <span class="section-process__dot"></span>
            <h2 class="section-process__item-title font-heading color-white">
              Optimize Real Data. Real Adjustment.
            </h2>
          </dev>
        </div>

        <h2 class="section-process__closing heading-1 font-heading color-white" data-process-reveal>
          No Theory. Only Execution.
        </h2>
      </div>
    </section>
  </main>

  <script>
    fetch("./components/footer.html")
      .then((response) => response.text())
      .then((data) => {
        document.getElementById("footer").innerHTML = data;
      });
  </script>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Branding Detail</title>
    <link rel="icon" href="./assets/images/favicon.ico" type="image/x-icon" />
    <meta property="og:url" content="" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="" />
    <meta property="og:description" content="" />
    <meta property="og:image" content="" />
    <link rel="stylesheet" href="./assets/libs/bootstrap.min.css" />
    <link rel="stylesheet" href="./assets/libs/lenis.css" />
    <link rel="stylesheet" href="./assets/libs/swiper-bundle.min.css" />
    <link rel="stylesheet" href="./assets/libs/lightpick.min.css" />
    <link rel="stylesheet" href="./assets/fonts/SVN-Agatho/font.css" />
    <link rel="stylesheet" href="./assets/fonts/SFU-Futura/font.css" />
    <link rel="stylesheet" href="./assets/main/css/style.min.css" />
    <script>
      if ("scrollRestoration" in history) {
        history.scrollRestoration = "manual";
      }
    </script>
  </head>

  <body class="page-branding-detail">
    <script>
      fetch("./components/header.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("header").innerHTML = data;
          const currentPath = window.location.pathname || "/";

          const navLinks = document.querySelectorAll(".header-menu ul>li>a");
          navLinks.forEach((link) => {
            const linkPath = link.getAttribute("href");

            let normalizedCurrentPath = currentPath;
            let normalizedLinkPath = linkPath;

            if (normalizedLinkPath.startsWith("./")) {
              normalizedLinkPath = normalizedLinkPath.substring(1);
            }

            const currentSegment = normalizedCurrentPath.split("/").pop() || "";
            const linkSegment = normalizedLinkPath.split("/").pop() || "";

            const isRootPath =
              currentPath === "/" ||
              currentPath.endsWith("/") ||
              currentSegment === "";

            const isHomeLink =
              linkPath === "/" ||
              linkPath === "./" ||
              linkPath === "./index.html" ||
              linkPath === "index.html" ||
              linkSegment === "index.html";

            const isMatch =
              normalizedLinkPath === normalizedCurrentPath ||
              currentSegment === linkSegment ||
              (isRootPath && isHomeLink) ||
              (currentPath.endsWith(normalizedLinkPath) &&
                normalizedLinkPath !== "/");

            if (isMatch) {
              link.classList.add("active");
            }
          });
        });
    </script>
    <header
      id="header"
      class="header position-fixed start-50 translate-middle-x"
    ></header>

    <main>
      <section class="hero">
        <div class="hero-inner">
          <div
            class="distortion-img"
            data-image-default="./assets/images/del/image-1.jpg"
            data-image-hover="./assets/images/del/image-2.jpg"
            data-displacement="./assets/images/displacement/displacement-1.jpg"
            data-intensity="0.03"
          >
            <img src="./assets/images/del/image-1.jpg" alt="" />
          </div>
          <div class="hero-content">
            <h1 class="heading-2 font-heading color-white">Branding Detail</h1>
            <p class="b1-font font-body color-white">Identity That Sells</p>
          </div>
        </div>
      </section>

      <section class="about-detail">
        <div class="limit-8-col about-detail__container">
          <h2 class="title">Branding Detail</h2>
          <div class="the-content">
            <p>
              Branding detail content will be updated for each project.
            </p>
          </div>
        </div>
      </section>
    </main>

    <script>
      fetch("./components/footer.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("footer").innerHTML = data;
        });
    </script>
    <footer id="footer"></footer>

    <script src="./assets/libs/jquery-3.7.1.js"></script>
    <script src="./assets/libs/lenis.min.js"></script>
    <script src="./assets/libs/gsap.min.js"></script>
    <script src="./assets/libs/ScrollTrigger.min.js"></script>
    <script src="./assets/libs/SplitText.min.js"></script>
    <script src="./assets/libs/bootstrap.bundle.min.js"></script>
    <script src="./assets/libs/swiper-bundle.min.js"></script>
    <script src="./assets/libs/moment.min.js"></script>
    <script src="./assets/libs/lightpick.min.js"></script>
    <script src="./assets/libs/three.js"></script>
    <script src="./assets/libs/hover.js"></script>
    <script type="module" src="./assets/main/js/script.min.js"></script>
  </body>
</html>
